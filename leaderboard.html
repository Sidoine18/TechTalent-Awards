<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classement Live | TechTalent Awards</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #070b14;
            --primary: #3b82f6;
            --secondary: #7c3aed;
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        /* --- NAVBAR --- */
        .navbar { padding: 20px 0; background: rgba(7, 11, 20, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.4rem; font-weight: 800; text-decoration: none; color: white; }
        .logo span { color: var(--primary); }

        /* --- HEADER --- */
        .leaderboard-header { text-align: center; padding: 60px 0 40px; }
        .live-indicator { display: inline-flex; align-items: center; gap: 8px; background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 15px; }
        .live-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* --- PODIUM --- */
        .podium { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin: 60px 0 80px; min-height: 350px; }
        .podium-item { flex: 1; max-width: 200px; display: flex; flex-direction: column; align-items: center; text-align: center; transition: 0.5s; opacity: 0; transform: translateY(50px); }
        .podium-item.visible { opacity: 1; transform: translateY(0); }
        
        .avatar-wrap { position: relative; margin-bottom: 15px; }
        .podium-avatar { width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--bg-dark); object-fit: cover; }
        .rank-badge { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.8rem; }
        
        .column { width: 100%; border-radius: 15px 15px 5px 5px; position: relative; display: flex; flex-direction: column; justify-content: flex-start; padding-top: 20px; font-weight: 800; }
        
        /* Or - 1er */
        .rank-1 { order: 2; height: 200px; background: linear-gradient(to top, rgba(255,215,0,0.3), rgba(255,215,0,0.1)); border: 1px solid var(--gold); }
        .rank-1 .podium-avatar { width: 110px; height: 110px; border-color: var(--gold); box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }
        .rank-1 .rank-badge { background: var(--gold); color: black; }
        
        /* Argent - 2ème */
        .rank-2 { order: 1; height: 150px; background: linear-gradient(to top, rgba(192,192,192,0.3), rgba(192,192,192,0.1)); border: 1px solid var(--silver); }
        .rank-2 .rank-badge { background: var(--silver); color: black; }
        
        /* Bronze - 3ème */
        .rank-3 { order: 3; height: 120px; background: linear-gradient(to top, rgba(205,127,50,0.3), rgba(205,127,50,0.1)); border: 1px solid var(--bronze); }
        .rank-3 .rank-badge { background: var(--bronze); color: white; }

        .podium-name { font-weight: 700; margin-bottom: 5px; font-size: 1rem; }
        .podium-votes { font-size: 0.9rem; color: var(--accent); font-weight: 800; }

        /* --- LISTE DES AUTRES --- */
        .ranking-list { background: rgba(30, 41, 59, 0.5); border-radius: 20px; padding: 10px; margin-bottom: 100px; border: 1px solid rgba(255,255,255,0.05); }
        .rank-row { display: grid; grid-template-columns: 50px 60px 1fr 120px; align-items: center; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .rank-row:last-child { border: none; }
        .rank-row:hover { background: rgba(255,255,255,0.02); transform: scale(1.01); }
        
        .list-rank { font-weight: 800; color: var(--text-muted); }
        .list-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .list-name { font-weight: 600; }
        .list-votes { text-align: right; font-weight: 800; color: var(--primary); }

        @media (max-width: 600px) {
            .podium { gap: 10px; margin-top: 100px; }
            .podium-name { font-size: 0.8rem; }
            .rank-1 .podium-avatar { width: 80px; height: 80px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">TechTalent<span>Awards</span></a>
            <div style="display:flex; gap:20px">
                <a href="candidates.html" style="color:white; text-decoration:none">Candidats</a>
                <a href="index.html" style="color:var(--text-muted); text-decoration:none">Accueil</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header class="leaderboard-header">
            <div class="live-indicator">
                <div class="live-dot"></div> Classement en Direct
            </div>
            <h1>Tableau d'Excellence</h1>
            <p style="color: var(--text-muted)">Les 10 pionniers de la tech africaine en compétition</p>
        </header>

        <div class="podium" id="podium-container">
            </div>

        <div class="ranking-list" id="ranking-list">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBm_OKWtWEPTdaR_CdDU68VFTQscuTwTDI",
            authDomain: "techtalent-awards.firebaseapp.com",
            projectId: "techtalent-awards",
            storageBucket: "techtalent-awards.firebasestorage.app",
            messagingSenderId: "750651688130",
            appId: "1:750651688130:web:a9baea58892b2b278ba75b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ÉCOUTE EN TEMPS RÉEL (onSnapshot)
        function startLeaderboard() {
            const q = query(collection(db, "candidates"), orderBy("votes", "desc"), limit(10));
            
            onSnapshot(q, (snapshot) => {
                const candidates = [];
                snapshot.forEach(doc => candidates.push({ id: doc.id, ...doc.data() }));
                
                renderLeaderboard(candidates);
            });
        }

        function renderLeaderboard(data) {
            const podiumContainer = document.getElementById('podium-container');
            const listContainer = document.getElementById('ranking-list');
            
            // 1. Gérer le Podium (Top 3)
            podiumContainer.innerHTML = '';
            const top3 = data.slice(0, 3);
            
            top3.forEach((c, index) => {
                const rank = index + 1;
                const item = document.createElement('div');
                item.className = `podium-item rank-${rank} visible`;
                item.innerHTML = `
                    <div class="avatar-wrap">
                        <img src="${c.profileImageUrl}" class="podium-avatar">
                        <div class="rank-badge">${rank}</div>
                    </div>
                    <div class="podium-name">${c.fullName.split(' ')[0]}</div>
                    <div class="podium-votes">${c.votes} pts</div>
                    <div class="column"></div>
                `;
                podiumContainer.appendChild(item);
            });

            // 2. Gérer le reste de la liste (Positions 4 à 10)
            listContainer.innerHTML = '';
            const others = data.slice(3);
            
            others.forEach((c, index) => {
                const row = document.createElement('div');
                row.className = 'rank-row';
                row.innerHTML = `
                    <div class="list-rank">#${index + 4}</div>
                    <img src="${c.profileImageUrl}" class="list-avatar">
                    <div class="list-name">${c.fullName} <span style="font-size:0.7rem; color:var(--text-muted); font-weight:normal">(${c.country})</span></div>
                    <div class="list-votes">${c.votes} votes</div>
                `;
                listContainer.appendChild(row);
            });
        }

        startLeaderboard();
    </script>
</body>
</html>
