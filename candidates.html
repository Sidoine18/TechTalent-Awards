<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidats | TechTalent Awards Africa</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --secondary: #7c3aed;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #00f0ff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            transition: 0.4s; padding: 20px 0;
        }
        .navbar.scrolled { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(15px); 
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        .navbar .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.6rem; font-weight: 800; text-decoration: none; color: white; letter-spacing: -1px; }
        .logo span { color: var(--primary); }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 500; transition: 0.3s; }
        .nav-links a.active, .nav-links a:hover { color: var(--accent); }

        /* --- HERO --- */
        .hero-mini { 
            padding: 160px 0 80px; 
            text-align: center; 
            background: radial-gradient(circle at 50% -20%, rgba(124, 58, 237, 0.15), transparent); 
        }
        h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 20px; font-weight: 800; }
        .text-gradient { 
            background: linear-gradient(90deg, var(--primary), var(--secondary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .hero-mini p { color: var(--text-muted); max-width: 600px; margin: 0 auto; font-size: 1.1rem; }

        /* --- FILTERS --- */
        .filters { margin-bottom: 40px; display: flex; justify-content: center; gap: 15px; }
        select {
            background: var(--bg-card);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 12px;
            outline: none;
            cursor: pointer;
        }

        /* --- CANDIDATES GRID --- */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0; transform: translateY(30px); /* Pour l'animation JS */
        }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card:hover {
            transform: translateY(-12px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px rgba(59, 130, 246, 0.1);
        }

        .card-img-wrapper { width: 100%; height: 280px; overflow: hidden; position: relative; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover .card-img { scale: 1.1; }

        .card-body { padding: 25px; }
        .badge-country { 
            font-size: 0.75rem; 
            background: rgba(59, 130, 246, 0.15); 
            color: var(--accent); 
            padding: 5px 12px; 
            border-radius: 50px; 
            font-weight: 600;
            text-transform: uppercase;
        }
        .card-name { font-size: 1.5rem; margin: 12px 0 5px; font-weight: 700; color: white; }
        .specialty { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 20px; }
        
        .card-footer { 
            display: flex; justify-content: space-between; align-items: center; 
            padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .votes-info span { display: block; }
        .vote-count { font-size: 1.2rem; font-weight: 800; color: var(--text-light); }
        .vote-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }

        /* --- BUTTONS --- */
        .btn-primary { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; padding: 12px 25px; border-radius: 12px; 
            text-decoration: none; border: none; cursor: pointer; 
            font-weight: 600; transition: 0.3s; display: inline-block;
        }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3); }

        /* --- FOOTER --- */
        footer { background: #070b14; padding: 60px 0 30px; border-top: 1px solid rgba(255,255,255,0.05); }
        .footer-content { text-align: center; margin-bottom: 40px; }
        .footer-socials { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .footer-socials a { color: var(--text-muted); font-size: 1.5rem; transition: 0.3s; }
        .footer-socials a:hover { color: var(--primary); }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="logo">TechTalent<span>Awards</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="candidates.html" class="active">Candidats</a></li>
                <li><a href="leaderboard.html">Classement</a></li>
                <li><a href="about.html">À propos</a></li>
            </ul>
            <a href="leaderboard.html" class="btn-primary">Voir Classement</a>
        </div>
    </nav>

    <header class="hero-mini">
        <div class="hero-content container">
            <h1>L'Excellence <span class="text-gradient">Tech Africaine</span></h1>
            <p>Votez pour vos candidats préférés et propulsez-les vers la victoire finale.</p>
        </div>
    </header>

        <div id="candidates-grid" class="grid-layout">
            </div>
    </section>

    <footer>
        <div class="container footer-content">
            <a href="#" class="logo">TechTalent<span>Awards</span></a>
            <div class="footer-socials">
                <a href="#"><i class="fab fa-linkedin"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <div class="container" style="text-align: center; color: var(--text-muted); font-size: 0.8rem;">
            &copy; 2026 TechTalent Awards Africa. Built with passion for the continent.
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURATION (La tienne)
        const firebaseConfig = {
            apiKey: "AIzaSyBm_OKWtWEPTdaR_CdDU68VFTQscuTwTDI",
            authDomain: "techtalent-awards.firebaseapp.com",
            projectId: "techtalent-awards",
            storageBucket: "techtalent-awards.firebasestorage.app",
            messagingSenderId: "750651688130",
            appId: "1:750651688130:web:a9baea58892b2b278ba75b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const grid = document.getElementById('candidates-grid');

        // Fonction pour charger les candidats
        async function fetchCandidates() {
            grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">Initialisation du radar de talents...</p>';
            
            try {
                const q = query(collection(db, "candidates"), orderBy("votes", "desc"));
                const querySnapshot = await getDocs(q);
                
                grid.innerHTML = ""; // On vide

                querySnapshot.forEach((doc) => {
                    const candidate = doc.data();
                    const id = doc.id;
                    createCard(id, candidate);
                });

                observeCards(); // Activer l'animation d'entrée
            } catch (error) {
                console.error("Erreur:", error);
                grid.innerHTML = `<p style="color:red; text-align:center; grid-column: 1/-1;">Erreur de connexion à la base de données.</p>`;
            }
        }

        // Création dynamique de la carte
        function createCard(id, data) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-img-wrapper">
                    <img src="${data.profileImageUrl || 'https://via.placeholder.com/400x500/0f172a/ffffff?text=TechTalent'}" class="card-img" alt="${data.fullName}">
                </div>
                <div class="card-body">
                    <span class="badge-country">📍 ${data.country}</span>
                    <h3 class="card-name">${data.fullName}</h3>
                    <p class="specialty">${data.specialty || 'Expert Informatique'}</p>
                    <div class="card-footer">
                        <div class="votes-info">
                            <span class="vote-count">${data.votes || 0}</span>
                            <span class="vote-label">Votes cumulés</span>
                        </div>
                        <a href="candidate.html?id=${id}" class="btn-primary">Voter</a>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        }

        // Animation au scroll (Observer)
        function observeCards() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry, index) => {
                    if (entry.isIntersecting) {
                        setTimeout(() => {
                            entry.target.classList.add('visible');
                        }, index * 100); // Effet cascade
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.card').forEach(card => observer.observe(card));
        }

        // Effet Navbar
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });

        // Lancement
        fetchCandidates();

    </script>
</body>
</html>
